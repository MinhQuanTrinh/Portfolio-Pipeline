x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIigo="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_CONN_MINIO_S3: >-
      aws://minioadmin:minioadmin@?endpoint_url=http%3A%2F%2Fminio%3A9000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./requirements-airflow.txt:/requirements.txt   # <-- airflow only
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "pip install -r /requirements.txt &&
               airflow db init &&
               airflow users create
                 --username admin --password admin
                 --firstname Admin --lastname User
                 --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install -r /requirements.txt && airflow webserver"
    ports: ["8080:8080"]
    restart: always
    depends_on: [airflow-init]

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install -r /requirements.txt && airflow scheduler"
    restart: always
    depends_on: [airflow-init]

  # dbt runs in its own isolated container
  dbt:
    image: python:3.11-slim
    working_dir: /dbt
    volumes:
      - ./stock_transforms:/dbt
      - ./requirements-dbt.txt:/requirements.txt     # <-- dbt only
      - ~/.dbt:/root/.dbt
    command: >
      bash -c "pip install -r /requirements.txt -q && tail -f /dev/null"
    depends_on: [minio]

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 3

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - ./requirements-dashboard.txt:/requirements.txt  # <-- dashboard only
    ports: ["8501:8501"]
    command: >
      bash -c "pip install -r /requirements.txt -q &&
               streamlit run app.py --server.address 0.0.0.0"
    depends_on: [minio]

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
