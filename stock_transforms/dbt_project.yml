name: stock_transforms
version: "1.0.0"
config-version: 2

profile: stock_transforms

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

on-run-start:
  - "INSTALL httpfs"
  - "LOAD httpfs"
  - "SET s3_region='us-east-1'"
  - "SET s3_url_style='path'"
  - "SET s3_endpoint='minio:9000'"
  - "SET s3_use_ssl=false"
  - "SET s3_access_key_id='minioadmin'"
  - "SET s3_secret_access_key='minioadmin'"

models:
  stock_transforms:
    # Ensure DuckDB/httpfs has S3 credentials available for every model.
    # Some models may run in separate SQL connections/operations.
    +pre-hook: "{{ set_minio_secrets() }}"
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    marts:
      +materialized: table
